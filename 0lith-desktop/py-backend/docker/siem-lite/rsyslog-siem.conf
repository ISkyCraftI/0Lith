# 0Lith Cyber Range — SIEM-lite rsyslog configuration
# ======================================================
# Collecte les messages syslog UDP et écrit dans /var/log/siem/consolidated.log
#
# Note: port 5514 (non-root) — pour port 514 standard, ajouter
#       CAP_NET_BIND_SERVICE dans le compose ou exécuter en root.

# Désactiver les modules imklog et imuxsock (non disponibles sans root)
module(load="imudp")
input(type="imudp" port="5514")

# Format consolidé : timestamp | source_ip | tag | message
$template SiemFormat,"%TIMESTAMP:::date-rfc3339% | %fromhost-ip% | %syslogtag:::secpath-replace% | %msg%\n"

# Écrire tous les messages entrants dans le log consolidé
*.* /var/log/siem/consolidated.log;SiemFormat

# Stopper après cette règle (ne pas appliquer les règles rsyslog par défaut)
& stop
